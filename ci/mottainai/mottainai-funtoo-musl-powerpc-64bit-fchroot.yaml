name: "vfscratch/macaroni/powerpc-64bit/mchroot"
artefact_path: sources
namespace: vfscratch-sources
script:
- sleep 5
- >-
  ego sync && emerge --jobs pyyaml jinja patchelf
- bin/sourcer musl fetch
- bin/builder musl powerpc-64bit cross_tools
- bin/builder musl powerpc-64bit tools
- bin/builder musl powerpc-64bit mchroot
environment:
- SHELL=/bin/bash
- LUET_NOLOCK=true
- LUET_YES=true
image: macaroni/bootstrap-builder
source: https://github.com/coffnix/vfscratch
type: lxd
directory: /
