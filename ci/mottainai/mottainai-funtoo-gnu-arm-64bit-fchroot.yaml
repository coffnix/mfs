name: "mfs/macaroni/gnu/arm-64bit/mchroot"
artefact_path: sources
namespace: mfs-sources
script:
- sleep 5
- >-
  ego sync && emerge --jobs pyyaml jinja patchelf
- bin/sourcer gnu fetch
- bin/builder gnu arm-64bit cross_tools
- bin/builder gnu arm-64bit tools
- bin/builder gnu arm-64bit mchroot
environment:
- SHELL=/bin/bash
- LUET_NOLOCK=true
- LUET_YES=true
image: macaroni/bootstrap-builder
source: https://github.com/coffnix/mfs
type: lxd
directory: /
