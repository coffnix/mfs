mchroot:
  defaults:
    template: mchroot.tmpl
  steps:
    - gcc-final: |
        export CC="${CLFS_TARGET}-gcc ${CLFS_CFLAGS}"
        export CXX="${CLFS_TARGET}-g++ ${CLFS_CFLAGS}"
        export CFLAGS="${CLFS_CFLAGS}"
        export CXXFLAGS="${CLFS_CFLAGS}"
        export CPPFLAGS=""
        export LDFLAGS=""

        rm -rf gcc-build
        mkdir gcc-build
        cd gcc-build

        ../configure \
        {%- if arch == "powerpc" %}
        --with-abi=elfv2 \
        --enable-secureplt \
        --enable-decimal-float=no \
        {%- endif %}
        {%- if gcc_arch %}
        --with-arch={{ gcc_arch }} \
        {%- endif %}
        {%- if gcc_cpu %}
        --with-cpu={{ gcc_cpu }} \
        {%- endif %}
        {%- if gcc_tune %}
        --with-tune={{ gcc_tune }} \
        {%- endif %}
        {%- if gcc_fpu %}
        --with-fpu={{ gcc_fpu }} \
        {%- endif %}
        {%- if gcc_float %}
        --with-float={{ gcc_float }} \
        {%- endif %}
        --prefix=/usr \
        --libdir=/usr/lib \
        --build=${CLFS_TARGET} \
        --host=${CLFS_TARGET} \
        --target=${CLFS_TARGET} \
        --with-local-prefix=/usr \
        --with-native-system-header-dir=/usr/include \
        --disable-multilib \
        --enable-languages=c,c++ \
        --without-isl \
        --enable-shared \
        --enable-threads=posix \
        --enable-__cxa_atexit \
        --enable-clocale=gnu \
        --enable-initfini-array \
        --enable-install-libiberty \
        --enable-linker-build-id \
        --disable-libstdcxx-pch \
        --disable-libsanitizer \
        --disable-bootstrap \
        --with-system-zlib \
        --with-gmp=/usr \
        --with-mpfr=/usr \
        --with-mpc=/usr

        make
        make install


        rm -f /usr/bin/cpp
        rm -f /usr/bin/gcc
        rm -f /usr/bin/g++
        rm -f /usr/bin/c++
        rm -f /usr/bin/gcc-ar
        rm -f /usr/bin/gcc-nm
        rm -f /usr/bin/gcc-ranlib
        rm -f /usr/bin/cc
        rm -f /usr/bin/${CLFS_TARGET}-cpp
        
        ln -sf ${CLFS_TARGET}-gcc /usr/bin/gcc
        ln -sf ${CLFS_TARGET}-g++ /usr/bin/g++
        ln -sf ${CLFS_TARGET}-c++ /usr/bin/c++
        ln -sf ${CLFS_TARGET}-gcc-ar /usr/bin/gcc-ar
        ln -sf ${CLFS_TARGET}-gcc-nm /usr/bin/gcc-nm
        ln -sf ${CLFS_TARGET}-gcc-ranlib /usr/bin/gcc-ranlib
        ln -sf gcc /usr/bin/cc
        printf '%s\n' '#!/bin/sh' "exec /usr/bin/${CLFS_TARGET}-gcc -E -x c \"\$@\"" > /usr/bin/${CLFS_TARGET}-cpp
        chmod 755 /usr/bin/${CLFS_TARGET}-cpp
        ln -sf ${CLFS_TARGET}-cpp /usr/bin/cpp

        file /usr/bin/gcc
        file /usr/bin/g++
        file /usr/bin/c++
        file /usr/bin/cc
        file /usr/bin/${CLFS_TARGET}-gcc
        file /usr/bin/${CLFS_TARGET}-g++
        file /usr/bin/${CLFS_TARGET}-gcov
        file /usr/bin/${CLFS_TARGET}-lto-dump

        install -d /var/db/pkg/sys-devel/gcc-${GCC_VERSION}
    - binutils: |
        mkdir binutils-build && cd binutils-build
        ../configure \
        --prefix=/usr \
        --build=${CLFS_TARGET} \
        --host=${CLFS_TARGET} \
        --target=${CLFS_TARGET} \
        --enable-ld=default \
        --disable-nls \
        --enable-shared \
        --enable-64-bit-bfd \
        --disable-multilib \
        --enable-plugins \
        --disable-gold \
        --disable-gprofng \
        --without-isl \
        --with-system-zlib \
        --enable-threads
        make MAKEINFO=true
        make MAKEINFO=true install-bfd
        make MAKEINFO=true install
        for t in ar as ld ld.bfd nm ranlib strip objcopy objdump readelf size strings addr2line c++filt elfedit; do
          [ -x "/usr/bin/$t" ] && ln -sf "$t" "/usr/bin/${CLFS_TARGET}-$t"
        done
    - linux: |
        test -e /usr/include/linux/version.h
        make INSTALL_HDR_PATH=/usr headers_install
        install -d /var/db/pkg/sys-kernel/linux-headers-${LINUX_VERSION}
    - pkgconf: |
        ./configure \
        --prefix=/usr
        make
        make install
        ln -sf pkgconf /usr/bin/pkg-config
        install -d /var/db/pkg/dev-util/pkgconf-${PKGCONF_VERSION}
    - perl: |
        sh Configure -des \
          -Dcc=gcc \
          -Dprefix=/usr \
          -Dsiteprefix=/usr/local \
          -Dvendorprefix=/usr \
          -Dscriptdir=/usr/bin \
          -Dprivlib=/usr/lib/perl5/${PERL_VERSION} \
          -Dsitelib=/usr/local/lib/perl5/${PERL_VERSION} \
          -Dvendorlib=/usr/lib/perl5/vendor_perl/${PERL_VERSION} \
          -Dlocincpth=/usr/include \
          -Dglibpth="/lib /usr/lib" \
          -Dmyhostname='localhost'
        make
        make install
        install -d /var/db/pkg/dev-lang/perl-${PERL_VERSION}
    - texinfo: |
        ./configure \
        --prefix=/usr

        make
        make install

        install -d /var/db/pkg/sys-apps/texinfo-${TEXINFO_VERSION}
    - autoconf: |
        ./configure \
        --prefix=/usr
        make
        make install
    - automake: |
        ./configure \
        --prefix=/usr
        make
        make install
    - libtool: |
        ./configure \
        --prefix=/usr \
        --disable-ltdl-install
        make
        make install
    - openssl: |
        CARCH=${CLFS_TARGET%%-*}

        case "${CARCH}" in
          aarch64*)    OPENSSL_TARGET="linux-aarch64" ;;
          arm*)        OPENSSL_TARGET="linux-armv4" ;;
          mips64*)     OPENSSL_TARGET="linux64-mips64" ;;
          mips*)       OPENSSL_TARGET="linux-mips32" ;;
          powerpc64le*) OPENSSL_TARGET="linux-ppc64le" ;;
          powerpc64*)  OPENSSL_TARGET="linux-ppc64" ;;
          powerpc*)    OPENSSL_TARGET="linux-ppc" ;;
          i?86)        OPENSSL_TARGET="linux-elf" ;;
          x86_64*)     OPENSSL_TARGET="linux-x86_64" ;;
          s390x*)      OPENSSL_TARGET="linux64-s390x" ;;
          riscv64*)    OPENSSL_TARGET="linux64-riscv64" ;;
          loongarch64*) OPENSSL_TARGET="linux64-loongarch64" ;;
          *)           OPENSSL_TARGET="linux-generic32" ;;
        esac

        perl ./Configure \
        ${OPENSSL_TARGET} \
        --prefix=/usr \
        --openssldir=/etc/ssl \
        --libdir=lib \
        shared \
        threads \
        zlib-dynamic \
        no-tests \
        ${CLFS_CFLAGS}

        make
        make install

        install -d /var/db/pkg/dev-libs/openssl-${OPENSSL_VERSION}
    - wget: |
        ./configure \
        ac_cv_libunistring=no \
        --prefix=/usr \
        --disable-assert \
        --disable-pcre \
        --disable-rpath \
        --without-included-libunistring \
        --without-libunistring-prefix \
        --with-ssl=openssl
        make
        make install
        install -d /var/db/pkg/net-misc/wget-${WGET_VERSION}
    - curl: |
        ./configure \
        --prefix=/usr \
        --with-openssl \
        --without-libpsl \
        --disable-static
        make
        make install
        install -d /var/db/pkg/net-misc/curl-${CURL_VERSION}
    - libffi: |
        ./configure \
        --prefix=/usr \
        --includedir=/usr/lib/libffi-${LIBFFI_VERSION/-/_}/include \
        --disable-multi-os-directory \
        --disable-static
        make
        make install
        install -d /var/db/pkg/dev-libs/libffi-${LIBFFI_VERSION/-/_}
    - python: |
        ./configure \
        --prefix=/usr \
        --enable-shared \
        --infodir=/usr/share/info \
        --mandir=/usr/share/man \
        --with-computed-gotos \
        --with-libc= \
        --enable-loadable-sqlite-extensions \
        --without-ensurepip
        make
        make install
        install -d /usr/lib/python-exec/python${PYTHON_VERSION%.*}
        ln -sf ../../../bin/python${PYTHON_VERSION%.*} /usr/lib/python-exec/python${PYTHON_VERSION%.*}/python${PYTHON_VERSION%%.*}
        ln -sf python${PYTHON_VERSION%%.*} /usr/lib/python-exec/python${PYTHON_VERSION%.*}/python
        cat > /usr/lib/python-exec/python${PYTHON_VERSION%.*}/python${PYTHON_VERSION%%.*}-config << "PYTHON_EOF"
        #!/bin/sh
        exec "python${PYTHON_VERSION%%.*}-config" "\${@}"
        PYTHON_EOF
        chmod +x /usr/lib/python-exec/python${PYTHON_VERSION%.*}/python${PYTHON_VERSION%%.*}-config
        ln -sf python${PYTHON_VERSION%%.*}-config /usr/lib/python-exec/python${PYTHON_VERSION%.*}/python-config
        ln -sf ../../../bin/2to3-${PYTHON_VERSION%.*} /usr/lib/python-exec/python${PYTHON_VERSION%.*}/2to3
        ln -sf ../../../bin/pydoc${PYTHON_VERSION%.*} /usr/lib/python-exec/python${PYTHON_VERSION%.*}/pydoc
        ln -sf ../../../bin/pyvenv-${PYTHON_VERSION%.*} /usr/lib/python-exec/python${PYTHON_VERSION%.*}/pyvenv
        install -d /var/db/pkg/dev-lang/python-${PYTHON_VERSION}
    - python-exec: |
        PYTHON_REAL="$(ls /usr/bin/python3.[0-9]* | grep -v config | head -n1)"
        PYTHON_IMPL="$("${PYTHON_REAL}" - << "PYEOF"
        import sys
        print(f"python{sys.version_info.major}.{sys.version_info.minor}")
        PYEOF
        )"

        ./configure \
        --prefix=/usr \
        --sysconfdir=/etc \
        --libdir=/usr/lib \
        --with-fallback-path=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
        --with-python-impls="${PYTHON_IMPL}"

        make
        make install

        install -d /etc/python-exec
        sed -n -e '/^#/p' config/python-exec.conf.example > /etc/python-exec/python-exec.conf
        echo "${PYTHON_IMPL}" >> /etc/python-exec/python-exec.conf

        ln -sf python-exec2c /usr/bin/python
        ln -sf python-exec2c /usr/bin/python2
        ln -sf python-exec2c /usr/bin/python3

        ln -sf ../lib/python-exec/python-exec2 /usr/bin/python-config
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/python2-config
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/python3-config
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/2to3
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/idle
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/pydoc
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/pyvenv

        install -d /var/db/pkg/dev-lang/python-exec-${PYTHON_EXEC_VERSION}
    - git: |
        ./configure \
        --prefix=/usr \
        --sysconfdir=/etc
        make
        make install
        install -d /var/db/pkg/dev-vcs/git-${GIT_VERSION}
    - pax-utils: |
        GIT_SSL_NO_VERIFY=true git clone https://github.com/ninja-build/ninja.git
        cd ninja
        ./configure.py --bootstrap
        cd ..
        chmod +x ./ninja/ninja
        export PATH=$PWD/ninja:$PATH
        GIT_SSL_NO_VERIFY=true git clone https://github.com/mesonbuild/meson.git
        cd meson ; git checkout 1.8.5 ; cd ..
        ./meson/meson.py setup builddir --prefix=/usr --buildtype=release
        cd builddir
        ../meson/meson.py compile
        ../meson/meson.py install
        install -d /var/db/pkg/app-misc/pax-utils-${PAX_UTILS_VERSION}
    - sandbox: |
        autoreconf -i -f
        ./configure \
        --prefix=/usr
        make
        make install
        install -d /var/db/pkg/sys-apps/sandbox-${SANDBOX_VERSION}
    - none: |
        cat > /etc/passwd << "PASSWD_EOF"
        root:x:0:0:root:/root:/bin/bash
        portage:x:250:250:portage:/var/tmp/portage:/bin/false
        PASSWD_EOF
        cat > /etc/group << "GROUP_EOF"
        root:x:0:root
        portage::250:portage
        GROUP_EOF
    - portage: |
        sed -e 's:^VERSION = "HEAD"$:VERSION = "'${PORTAGE_VERSION}'":' -i lib/portage/__init__.py

        printf "[build_ext]\nportage-ext-modules=true\n" >> setup.cfg

        sed -e '/^sync-rsync-verify-metamanifest/s|yes|no|' \
            -e '/^sync-webrsync-verify-signature/s|yes|no|' \
            -i cnf/repos.conf

        PYTHON_REAL="$(ls /usr/bin/python3.[0-9]* | grep -v config | head -n1)"
        PYTHON_IMPL="$("${PYTHON_REAL}" - << "PYEOF"
        import sys
        print(f"python{sys.version_info.major}.{sys.version_info.minor}")
        PYEOF
        )"

        install -d /usr/lib/python-exec/${PYTHON_IMPL}

        /usr/bin/python3 setup.py build
        /usr/bin/python3 setup.py install \
          --system-prefix=/usr \
          --bindir=/usr/lib/python-exec/${PYTHON_IMPL} \
          --sbindir=/usr/lib/python-exec/${PYTHON_IMPL} \
          --docdir=/usr/share/doc/portage-${PORTAGE_VERSION} \
          --htmldir=/usr/share/doc/portage-${PORTAGE_VERSION}/html \
          --portage-bindir=/usr/lib/portage/python \
          --sysconfdir=/etc

        install -d /usr/bin
        install -d /usr/sbin

        ln -sf ../lib/python-exec/python-exec2 /usr/bin/ebuild
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/egencache
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/emerge
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/emirrordist
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/portageq
        ln -sf ../lib/python-exec/python-exec2 /usr/bin/quickpkg

        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/archive-conf
        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/dispatch-conf
        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/emaint
        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/env-update
        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/etc-update
        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/fixpackages
        ln -sf ../lib/python-exec/python-exec2 /usr/sbin/regenworld

        test -x /usr/lib/python-exec/${PYTHON_IMPL}/emerge
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/ebuild
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/env-update
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/archive-conf
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/dispatch-conf
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/emaint
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/etc-update
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/fixpackages
        test -x /usr/lib/python-exec/${PYTHON_IMPL}/regenworld

        rm -f /usr/share/portage/config/repos.conf

        install -d /etc/portage
        cat > /etc/portage/make.conf << "MKCF_EOF"
        FEATURES="-pid-sandbox"
        FETCHCOMMAND="wget --no-check-certificate -t 3 -T 60 --passive-ftp -O \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
        RESUMECOMMAND="wget --no-check-certificate -c -t 3 -T 60 --passive-ftp -O \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
        MKCF_EOF

        ln -sf portage/make.conf /etc/make.conf

        install -d /etc/portage/make.profile
        cat > /etc/portage/make.profile/parent << "MKP_EOF"
        core-kit:funtoo/1.0/linux-gnu/arch/{{ego_arch}}
        core-kit:funtoo/1.0/linux-gnu/arch/{{ego_arch}}/subarch/{{ego_subarch}}
        core-kit:funtoo/1.0/linux-gnu/build/mark
        core-kit:funtoo/1.0/linux-gnu/flavor/core
        core-kit:funtoo/1.0/linux-gnu/mix-ins/stage1
        MKP_EOF

        install -d /var/log/portage/elog
        chown portage:portage /var/log/portage /var/log/portage/elog 2>/dev/null || true
        chmod g+s,ug+rwx /var/log/portage /var/log/portage/elog 2>/dev/null || true

        install -d /var/db/pkg/sys-apps/portage-${PORTAGE_VERSION}
    - ego: |
        install -d /usr/share/ego/modules
        install -d /usr/share/ego/modules-info
        install -d /usr/share/ego/python
        install -d /usr/bin
        install -d /sbin
        install -d /etc

        cp modules/*.ego /usr/share/ego/modules/
        rm -f /usr/share/ego/modules/upgrade*

        cp modules-info/* /usr/share/ego/modules-info/
        rm -f /usr/share/ego/modules-info/upgrade*

        cp -r python/* /usr/share/ego/python/
        rm -rf /usr/share/ego/python/test

        install -m 0755 ego /usr/bin/ego
        ln -sf ego /usr/bin/epro
        ln -sf ego /usr/bin/edoc
        ln -sf ../usr/bin/ego /sbin/boot-update

        cp etc/*.conf* /etc/

        cat > /etc/ego.conf << "EGO_EOF"
        [global]
        release = mark-31
        python_kit_profile = mark
        sync_base_url = https://github.com/macaroni-os/{repo}
        EGO_EOF

        install -d /var/db/pkg/app-admin/ego-${EGO_VERSION}

        GIT_SSL_NO_VERIFY=true ego sync
    - none-final: |
        export FEATURES="-pid-sandbox nodoc noman noinfo"
        export CONFIG_PROTECT="-* /etc/ego.conf"
        {% if target == "armv7a-unknown-linux-gnueabihf" %}
        epro arch arm-32bit
        epro subarch banana-pi-a7
        {% endif %}
        epro flavor core
        ego profile mix-in -stage1
        ego profile mix-in +stage1
        # This allows all files in /etc/ to be directly overwritten.
        export CONFIG_PROTECT="-*"
        # This will ensure base files for env-update are in place. -build since fs already exists.
        USE="-build" emerge --nodeps baselayout
        /sbin/ldconfig
        /usr/sbin/env-update
        source /etc/profile
        export CONFIG_PROTECT="-*"
        export FEATURES="-pid-sandbox nodoc noman noinfo"
        test -e /etc/ld.so.conf
        test -e /etc/ld.so.cache

        # remove to prevent binutils mistakenly linking against this, which is non-PIC and won't work.
        rm -f /usr/lib/libiberty.a
        emerge --jobs=3 binutils

        # since we don't have gcc-config running, which manages and sets up typical symlinks that ebuilds
        # expect to find for certain things, we need to make sure this one is created manually. Without this,
        # rust can't link and dev-python/cryptography fails to build.

        if [ ! -e /usr/bin/cc ]; then
          ( cd /usr/bin; ln -s gcc cc )
        fi

        # If ncurses is built with libtinfo (i.e. USE="tinfo"), then libtinfo will exist, and bash will
        # currently automatically link against it even if we tell it to just use ncurses (see FL-10034).
        # So, if libtinfo is on this filesystem, then we want ncurses with USE="tinfo" on the stage1root.
        # For now, I think I will address this by syncing with macaroni norms and ensuring ncurses is
        # built with libtinfo disabled.

        # The pre-built util-linux doesn't install libmount, which is required by glib. If we don't merge~
        # util-linux officially, glib will think libmount is installed but glib meson configure will fail
        # when the lib isn't found:

        export GIT_SSL_NO_VERIFY=true
        emerge --jobs=3 app-misc/ca-certificates
        update-ca-certificates || true
        cat > /etc/portage/make.conf << "MKCF_EOF2"
        FEATURES="-pid-sandbox"
        FETCHCOMMAND="wget --no-check-certificate -t 3 -T 60 --passive-ftp -O \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
        RESUMECOMMAND="wget --no-check-certificate -c -t 3 -T 60 --passive-ftp -O \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
        PYTHON_TARGETS="python3_9"
        PYTHON_SINGLE_TARGET="python3_9"
        MKCF_EOF2
        echo 'sys-apps/kmod lzma pkcs7 python tools zlib zstd' > /etc/portage/package.use
        echo 'sys-apps/attr nls split-usr static-libs ' >> /etc/portage/package.use
        echo 'sys-apps/acl nls split-usr' >> /etc/portage/package.use
        echo 'sys-apps/util-linux caps cramfs logger ncurses nls pam python readline split-usr static-libs suid tty-helpers unicode' >> /etc/portage/package.use
        emerge --jobs=3 python
        emerge --jobs=3 portage
        emerge sys-apps/attr
        emerge sys-apps/acl
        emerge --jobs=3 kmod
        emerge dev-lang/python-exec
        emerge --jobs=3 util-linux
        emerge --jobs=3 ncurses python
        emerge --jobs=3 bash gcc
        gcc-config 1

