mchroot:
  defaults:
    template: stage3.tmpl

  steps:
    - none: |
        # Do this so we have an updated tree if resuming from here:
        #GIT_SSL_NO_VERIFY=true ego sync

        # Do this before setting ROOT:
        /usr/sbin/env-update
        /sbin/ldconfig
        source /etc/profile

        export LANG=C
        export LC_ALL=C
        export CONFIG_PROTECT="-*"
        export FEATURES="-pid-sandbox nodoc noman noinfo"

        export GIT_CONFIG_GLOBAL=/dev/null
        export GIT_DISCOVERY_ACROSS_FILESYSTEM=0
        export GIT_CEILING_DIRECTORIES=/var/tmp/portage:/tmp:/

        export ROOT=/tmp/stage1root
        emerge -1 sys-apps/sysvinit
        emerge -1 sys-apps/openrc

        USE="-pam" emerge -1 sys-apps/shadow
        USE="-elogind" emerge -1 sys-libs/pam
        emerge -1 sys-auth/pambase
        emerge -1 sys-auth/elogind
        emerge -1 sys-apps/shadow

        {% if target == "armv7a-unknown-linux-gnueabihf" %}
        install -d /var/overlay/overlay-local/profiles
        install -d /var/overlay/overlay-local/metadata
        install -d /var/overlay/overlay-local/sys-boot/u-boot-bananapi
        install -d /etc/portage/repos.conf

        echo overlay-local > /var/overlay/overlay-local/profiles/repo_name

        printf '%s\n' 'sys-boot' \
          > /var/overlay/overlay-local/profiles/categories

        printf '%s\n' \
          'thin-manifests = true' \
          'sign-manifests = false' \
          'profile-formats = portage-2' \
          'cache-formats = md5-dict' \
          'masters = core-kit' \
          > /var/overlay/overlay-local/metadata/layout.conf

        printf '%s\n' \
          '[overlay-local]' \
          'location = /var/overlay/overlay-local' \
          'auto-sync = no' \
          'priority = 10' \
          > /etc/portage/repos.conf/overlay-local

        #wget --no-check-certificate \
        #  -O /var/overlay/overlay-local/sys-boot/u-boot-bananapi/u-boot-bananapi-2026.04.ebuild \
        #  https://raw.githubusercontent.com/coffnix/coffnix-ebuilds/refs/heads/master/sys-boot/u-boot-bananapi/u-boot-bananapi-2026.04.ebuild

        #ebuild /var/overlay/overlay-local/sys-boot/u-boot-bananapi/u-boot-bananapi-2026.04.ebuild manifest
        #emerge sys-boot/u-boot-bananapi

        #emerge sys-kernel/vanilla-sources
        #emerge sys-libs/ncurses
        #emerge dev-embedded/u-boot-tools

        #cd ${ROOT}/usr/src/linux

        #make ARCH=arm sunxi_defconfig
        #make ARCH=arm olddefconfig

        #make ARCH=arm -j$(nproc) zImage modules dtbs
        #make ARCH=arm INSTALL_MOD_PATH=${ROOT} modules_install

        #install -d ${ROOT}/boot
        #install -d ${ROOT}/boot/dtb

        #install -m 0644 arch/arm/boot/zImage \
        #  ${ROOT}/boot/zImage

        #find arch/arm/boot/dts/ -type f -name 'sun7i-a20-*.dtb' \
        #  -exec install -m 0644 {} ${ROOT}/boot/dtb/ \;

        #cp -f \
        #  arch/arm/boot/dts/allwinner/sun7i-a20-bananapro.dtb \
        #  ${ROOT}/boot/dtb/sun7i-a20-bananapro.dtb 2>/dev/null || \
        #cp -f \
        #  arch/arm/boot/dts/sun7i-a20-bananapro.dtb \
        #  ${ROOT}/boot/dtb/sun7i-a20-bananapro.dtb

        install -d ${ROOT}/etc

        printf '%s\n' \
          'UUID=e9f90286-197d-4ed4-a459-94ea0514c252  /  ext4  defaults,noatime  0 1' \
          > ${ROOT}/etc/fstab

        printf '%s\n' \
          'setenv bootargs console=ttyS0,115200 console=tty1 root=UUID=e9f90286-197d-4ed4-a459-94ea0514c252 rootwait rootfstype=ext4 panic=10' \
          '' \
          'load mmc 0:1 0x42000000 boot/zImage' \
          'load mmc 0:1 0x43000000 boot/dtb/sun7i-a20-bananapro.dtb' \
          '' \
          'bootz 0x42000000 - 0x43000000' \
          > ${ROOT}/boot/boot.cmd

        ${ROOT}/usr/bin/mkimage -C none -A arm -T script \
          -d ${ROOT}/boot/boot.cmd \
          ${ROOT}/boot/boot.scr

        {% elif target == "x86_64-pc-linux-gnu" or target == "x86_64-unknown-linux-gnu" %}
        ego profile mix-ins +kernel-sid

        emerge sys-kernel/debian-sources:sid

        cd ${ROOT}/usr/src/linux

        make olddefconfig

        make -j$(nproc)

        make INSTALL_MOD_PATH=${ROOT} modules_install

        install -d ${ROOT}/boot

        install -m 0644 arch/x86/boot/bzImage \
          ${ROOT}/boot/kernel

        {% elif target == "aarch64-unknown-linux-gnu" %}
        emerge sys-kernel/vanilla-sources

        cd ${ROOT}/usr/src/linux

        make ARCH=arm64 defconfig
        make ARCH=arm64 olddefconfig

        make ARCH=arm64 -j$(nproc) Image modules dtbs
        make ARCH=arm64 INSTALL_MOD_PATH=${ROOT} modules_install

        install -d ${ROOT}/boot
        install -d ${ROOT}/boot/dtb

        install -m 0644 arch/arm64/boot/Image \
          ${ROOT}/boot/kernel

        find arch/arm64/boot/dts/ -type f -name '*.dtb' \
          -exec install -m 0644 {} ${ROOT}/boot/dtb/ \;

        {% else %}
        emerge sys-kernel/vanilla-sources

        cd ${ROOT}/usr/src/linux

        make olddefconfig

        make -j$(nproc)

        make INSTALL_MOD_PATH=${ROOT} modules_install

        install -d ${ROOT}/boot
        {% endif %}
