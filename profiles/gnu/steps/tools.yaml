tools:
  defaults:
    template: tools_usr.tmpl
  steps:
    - none: |
        # Cleanup /bin symlinks from previous runs
        rm -f ${CLFS}/bin/bash ${CLFS}/bin/sh
    - m4: |
        {% if bits == 32 %}
        export CPPFLAGS="${CPPFLAGS:-} -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        {% endif %}
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-devel/m4-${M4_VERSION}
    - gmp: |
        ./configure \
        --prefix=/usr \
        --with-sysroot=${CLFS} \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/dev-libs/gmp-${GMP_VERSION}
    - mpfr: |
        ./configure \
        --prefix=/usr \
        --with-sysroot=${CLFS} \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/dev-libs/mpfr-${MPFR_VERSION}
    - mpc: |
        ./configure \
        --prefix=/usr \
        --with-sysroot=${CLFS} \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/dev-libs/mpc-${MPC_VERSION}
    - zlib: |
        unset CC CXX AR AS RANLIB LD STRIP
        CHOST=${CLFS_TARGET} \
        ./configure \
        --prefix=/usr
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-libs/zlib-${ZLIB_VERSION}
    - gettext: |
        {% if bits == 32 %}
        export CPPFLAGS="${CPPFLAGS:-} -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        {% endif %}
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --disable-threads \
        --without-emacs \
        --disable-shared
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-devel/gettext-${GETTEXT_VERSION}
    - bison: |
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --docdir=/usr/share/doc/bison-${BISON_VERSION}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-devel/bison-${BISON_VERSION}
    - binutils: |
        mkdir binutils-build && cd binutils-build
        ../configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --target=${CLFS_TARGET} \
        --with-sysroot=${CLFS} \
        --enable-ld=default \
        --disable-nls \
        --enable-shared \
        --enable-64-bit-bfd \
        --disable-multilib \
        --enable-plugins \
        --disable-gold \
        --disable-gprofng \
        --with-system-zlib \
        --enable-threads
        make
        make DESTDIR=${CLFS} install-bfd
        make DESTDIR=${CLFS} install
    - gcc: |
        unset CC CXX CFLAGS CXXFLAGS CPPFLAGS LDFLAGS AR AS LD NM RANLIB STRIP
        export CC_FOR_BUILD="gcc"
        export CXX_FOR_BUILD="g++"
        export AR_FOR_BUILD="ar"
        export AS_FOR_BUILD="as"
        export LD_FOR_BUILD="ld"
        export NM_FOR_BUILD="nm"

        export RANLIB_FOR_BUILD="ranlib"
        sed -i 's|^RAW_CXX_FOR_TARGET="$CXX_FOR_TARGET|& -nostdinc++|' configure
        install -d ${CLFS}/usr/${CLFS_TARGET}
        ln -sfn ../include ${CLFS}/usr/${CLFS_TARGET}/include
        ln -sfn ../include ${CLFS}/usr/${CLFS_TARGET}/sys-include
        ln -sfn ../lib ${CLFS}/usr/${CLFS_TARGET}/lib
        install -d /usr/i686-pc-linux-gnu
        ln -sfn ${CLFS}/usr/include /usr/i686-pc-linux-gnu/include
        ln -sfn ${CLFS}/usr/include /usr/i686-pc-linux-gnu/sys-include
        ln -sfn ${CLFS}/usr/lib /usr/i686-pc-linux-gnu/lib
        mkdir gcc-build && cd gcc-build
        ../configure \
        {%- if arch == "powerpc" %}
        --with-abi=elfv2 \
        --enable-secureplt \
        --enable-decimal-float=no \
        {%- endif %}
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_HOST} \
        --target=${CLFS_TARGET} \
        CC_FOR_TARGET="${CLFS_TARGET}-gcc" \
        --with-build-sysroot=${CLFS} \
        --with-local-prefix=${CLFS}/usr \
        --disable-multilib \
        --enable-languages=c,c++ \
        --with-system-zlib \
        --with-native-system-header-dir=/usr/include \
        --disable-libssp \
        --disable-c++tools \
        --enable-initfini-array \
        --enable-install-libiberty \
        --disable-libstdcxx-pch \
        --disable-libsanitizer \
        --with-mpfr=${CLFS}/cross-tools \
        --with-gmp=${CLFS}/cross-tools \
        --with-mpc=${CLFS}/cross-tools
        make \
        AS_FOR_TARGET="${CLFS_TARGET}-as" \
        LD_FOR_TARGET="${CLFS_TARGET}-ld"
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-devel/gcc-${GCC_VERSION}
    - ncurses: |
        sed -i -e "s/INSTALL_OPT_S=\\\"-s/& --strip-program=${STRIP}/" configure
        mkdir ncurses-build && cd ncurses-build
        ../configure \
        --prefix=/usr \
        --without-cxx-binding \
        --without-cxx \
        --with-shared \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --without-debug \
        --without-ada \
        --enable-overwrite \
        --with-build-cc=gcc \
        --enable-overwrite \
        --with-default-terminfo-dir=/usr/share/terminfo \
        --without-termlib
        # Note: As per FL-10034, --without-termlib must match default on Macaroni, so that things
        #       like bash don't try linking against it and then expect ncurses[tinfo] on stage1.
        make
        make DESTDIR=${CLFS} install
        cd .. && mkdir ncursesw-build && cd ncursesw-build
        ../configure \
        --prefix=/usr \
        --without-cxx-binding \
        --without-cxx \
        --with-shared \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --without-debug \
        --without-ada \
        --enable-overwrite \
        --with-build-cc=gcc \
        --enable-widec \
        --includedir=/usr/include/ncursesw \
        --with-default-terminfo-dir=/usr/share/terminfo \
        --without-termlib
        # Note: As per FL-10034, --without-termlib must match default on Macaroni, so that things
        #       like bash don't try linking against it and then expect ncurses[tinfo] on stage1.
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-libs/ncurses-${NCURSES_VERSION}
    - bash: |
        cat > config.cache << "BASH_EOF"
        ac_cv_func_mmap_fixed_mapped=yes
        ac_cv_func_strcoll_works=yes
        ac_cv_func_working_mktime=yes
        bash_cv_func_sigsetjmp=present
        bash_cv_getcwd_malloc=yes
        bash_cv_job_control_missing=present
        bash_cv_printf_a_format=yes
        bash_cv_sys_named_pipes=present
        bash_cv_ulimit_maxfds=yes
        bash_cv_under_sys_siglist=yes
        bash_cv_unusable_rtsigs=no
        gt_cv_int_divbyzero_sigfpe=yes
        BASH_EOF
        ./configure \
        LDFLAGS="-L${CLFS}/usr/lib -lncursesw -Wl,-rpath,${CLFS}/usr/lib -Wl,-rpath-link,${CLFS}/usr/lib" \
        CFLAGS="-I${CLFS}/usr/include" \
        CXXFLAGS="-I${CLFS}/usr/include" \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --disable-profiling \
        --with-curses \
        --without-bash-malloc \
        --cache-file=config.cache
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/bin
        mv ${CLFS}/usr/bin/bash ${CLFS}/bin
        test -x ${CLFS}/bin/bash
        # set up initial shells in correct location for "#!/bin/sh" and "#!/bin/bash" scripts:
        rm -f ${CLFS}/bin/sh || true
        ln -sf bash ${CLFS}/bin/sh
        install -d ${CLFS}/var/db/pkg/app-shells/bash-${BASH_VERSION}
    - bzip2: |
        sed -i \
          -e '/^all/s/ test$//' \
          -e 's|CFLAGS=|&-fPIC |' \
        Makefile
        make CC="${CC}" AR="${AR}" RANLIB="${RANLIB}"
        make PREFIX=${CLFS}/usr install
        install -d ${CLFS}/var/db/pkg/app-arch/bzip2-${BZIP2_VERSION}
    - check: |
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --disable-subunit
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/dev-libs/check-${CHECK_VERSION}
    - coreutils: |
        {% if bits == 32 %}
        printf '%s\n' \
        'gl_cv_header_working_limits_h=yes' \
        'gl_cv_func_strcasecmp_works=yes' \
        'ac_cv_func_pipe2=no' \
        'gl_cv_onwards_func_pipe2=no' \
        'ac_cv_func_renameat2=no' \
        'gl_cv_onwards_func_renameat2=no' \
        'gl_cv_func_renameat2_works=no' \
        'ac_cv_func_utmpxname=no' \
        'ac_cv_func_qsort_r=no' \
        'gl_cv_func_qsort_r=no' \
        'gl_cv_onwards_func_qsort_r=no' \
        'ac_cv_func_mkostemp=no' \
        'gl_cv_onwards_func_mkostemp=no' \
        'ac_cv_func_secure_getenv=no' \
        'gl_cv_func_secure_getenv=no' \
        'ac_cv_func_futimesat=no' \
        'gl_cv_func_futimesat=no' \
        'ac_cv_func_wmempcpy=no' \
        'gl_cv_func_wmempcpy=no' \
        'ac_cv_func_rawmemchr=no' \
        'gl_cv_func_rawmemchr=no' \
        'ac_cv_func_euidaccess=no' \
        'gl_cv_func_euidaccess=no' \
        'ac_cv_func_eaccess=no' \
        'gl_cv_func_eaccess=no' \
        'ac_cv_func_splice=no' \
        'gl_cv_func_splice=no' \
        'ac_cv_func_vmsplice=no' \
        'gl_cv_func_vmsplice=no' \
        'ac_cv_func_syncfs=no' \
        'gl_cv_func_syncfs=no' \
        'ac_cv_func_strtold_l=no' \
        'gl_cv_func_strtold_l=no' \
        'ac_cv_func_strverscmp=no' \
        'gl_cv_func_strverscmp=no' \
        > config.cache
        export CPPFLAGS="-D_GNU_SOURCE -D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE -D_LARGEFILE64_SOURCE -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        export CFLAGS="-march=pentium4 -O2 -pipe -D_GNU_SOURCE -D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE -D_LARGEFILE64_SOURCE"
        export COREUTILS_YEAR2038="--disable-year2038"
        export COREUTILS_CACHE="--cache-file=config.cache"
        {% else %}
        export COREUTILS_YEAR2038=""
        export COREUTILS_CACHE=""
        {% endif %}
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --enable-install-program=hostname \
        ${COREUTILS_CACHE} \
        ${COREUTILS_YEAR2038}
        {% if bits == 32 %}
        sed -i \
          -e 's/^HAVE_STRVERSCMP = 1/HAVE_STRVERSCMP = 0/' \
          -e 's/^GL_GNULIB_STRVERSCMP = 0/GL_GNULIB_STRVERSCMP = 1/' \
          Makefile
        {% endif %}
        sed -i -e 's/^man1_MANS/#man1_MANS/' Makefile
        sed -i -e 's/^man1_MANS/#man1_MANS/' Makefile
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/bin
        MV=/bin/mv
        for bin in cat chgrp chmod chown cp date dd df echo \
                    false hostname ln ls mkdir mknod mv pwd rm \
                    rmdir stty sync true uname \
                    basename chroot cut dir dirname du env expr \
                    head mkfifo mktemp readlink seq sleep sort \
                    tail touch tr tty vdir wc yes; do
          if [ ! -e ${CLFS}/bin/${bin} ] && [ -e ${CLFS}/usr/bin/${bin} ]; then
            $MV ${CLFS}/usr/bin/${bin} ${CLFS}/bin
          fi
        done
        for sym in basename chroot cut dir dirname du env expr \
                    head mkfifo mktemp readlink seq sleep sort \
                    tail touch tr tty vdir wc yes; do
          if [ ! -e ${CLFS}/usr/bin/${sym} ]; then
            ln -s ../../bin/${sym} ${CLFS}/usr/bin/${sym}
          fi
        done
        install -d ${CLFS}/var/db/pkg/sys-apps/coreutils-${COREUTILS_VERSION}
    - diffutils: |
        {% if bits == 32 %}
        printf '%s\n' \
        'gl_cv_header_working_limits_h=yes' \
        'gl_cv_func_strcasecmp_works=yes' \
        > config.cache
        export CPPFLAGS="-D_GNU_SOURCE -include ${CLFS}/usr/include/limits.h"
        export DIFFUTILS_CACHE="--cache-file=config.cache"
        {% else %}
        export DIFFUTILS_CACHE=""
        {% endif %}
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        ${DIFFUTILS_CACHE}
        sed -i 's/^GL_CFLAG_GNULIB_WARNINGS = .*$/GL_CFLAG_GNULIB_WARNINGS = -Wno-cast-qual -Wno-conversion -Wno-float-equal -Wno-sign-compare -Wno-undef -Wno-unused-function -Wno-unused-parameter -Wno-float-conversion -Wimplicit-fallthrough -Wno-pedantic -Wno-sign-conversion -Wno-type-limits -Wno-unused-const-variable -Wno-unsuffixed-float-constants/' Makefile lib/Makefile
        make -C lib
        make -C src
        make DESTDIR=${CLFS} -C src install
        install -d ${CLFS}/var/db/pkg/sys-apps/diffutils-${DIFFUTILS_VERSION}
    - xz-utils: |
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/app-arch/xz-utils-${XZ_UTILS_VERSION}
    - file: |
        export CPPFLAGS="-I${CLFS}/usr/include"
        export LDFLAGS="-L${CLFS}/usr/lib -L${CLFS}/lib -Wl,-rpath-link=${CLFS}/usr/lib -Wl,-rpath-link=${CLFS}/lib"
        export PKG_CONFIG_LIBDIR="${CLFS}/usr/lib/pkgconfig:${CLFS}/usr/share/pkgconfig"
        export PKG_CONFIG_PATH=""
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --with-sysroot=${CLFS} \
        --with-pic=yes
    
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/file-${FILE_VERSION}
    - findutils: |
        echo "gl_cv_func_wcwidth_works=yes" > config.cache
        echo "ac_cv_func_fnmatch_gnu=yes" >> config.cache
    
        {% if bits == 32 %}
        echo "gl_cv_header_working_limits_h=yes" >> config.cache
        export CPPFLAGS="-D_GNU_SOURCE -D_POSIX_ARG_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --cache-file=config.cache
    
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/findutils-${FINDUTILS_VERSION}
    - gawk: |
        ./configure \
        --prefix=/usr \
        --libexec=/usr/lib/misc \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --with-sysroot=${CLFS} \
        ac_cv_libsigsegv=no
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/usr/include/awk
        cp *.h ${CLFS}/usr/include/awk/
        rm ${CLFS}/usr/include/awk/config.h
        ln -sf gawk ${CLFS}/usr/bin/awk
        install -d ${CLFS}/var/db/pkg/sys-apps/gawk-${GAWK_VERSION}
    - grep: |
        {% if bits == 32 %}
        export CPPFLAGS="-D_GNU_SOURCE -DPATH_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
    
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/grep-${GREP_VERSION}
    - gzip: |
        {% if bits == 32 %}
        export CPPFLAGS="-D_GNU_SOURCE -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
    
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/app-arch/gzip-${GZIP_VERSION}
    - make: |
        ./configure \
        --prefix=/usr \
        --program-prefix=g \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --without-guile
        make
        make DESTDIR=${CLFS} install
        ln -sf gmake ${CLFS}/usr/bin/make
        ln -sf gmake.1 ${CLFS}/usr/share/man/man1/make.1
        install -d ${CLFS}/var/db/pkg/sys-devel/make-${MAKE_VERSION}
    - patch: |
        {% if bits == 32 %}
        export CPPFLAGS="-D_GNU_SOURCE -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
    
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-devel/patch-${PATCH_VERSION}
    - sed: |
        {% if bits == 32 %}
        export CPPFLAGS="-D_GNU_SOURCE -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
    
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/sed-${SED_VERSION}
    - tar: |
        #--bindir=/bin \
        cat > config.cache << "BASH_EOF"
        gl_cv_func_wcwidth_works=yes
        gl_cv_func_btowc_eof=yes
        ac_cv_func_malloc_0_nonnull=yes
        gl_cv_func_mbrtowc_incomplete_state=yes
        gl_cv_func_mbrtowc_nul_retval=yes
        gl_cv_func_mbrtowc_null_arg1=yes
        gl_cv_func_mbrtowc_null_arg2=yes
        gl_cv_func_mbrtowc_retval=yes
        gl_cv_func_wcrtomb_retval=yes
        BASH_EOF
    
        {% if bits == 32 %}
        export CPPFLAGS="-D_GNU_SOURCE -DMB_LEN_MAX=16 -DPATH_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --libexecdir=/usr/sbin \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --cache-file=config.cache
        make
        make DESTDIR=${CLFS} install
        ln -sf tar ${CLFS}/usr/bin/gtar
        install -d ${CLFS}/var/db/pkg/app-arch/tar-${TAR_VERSION}
    - zstd: |
          make
          make PREFIX=/usr LIBDIR=/usr/lib DESTDIR=${CLFS} install
          install -d ${CLFS}/var/db/pkg/app-arch/zstd-${ZSTD_VERSION}
    - texinfo: |
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/texinfo-${TEXINFO_VERSION}
    - util-linux: |
        # This must be disabled as per FL-10034.
        # LDFLAGS="-ltinfow"
    
        {% if bits == 32 %}
        export UTIL_LINUX_CFLAGS="-I${CLFS}/usr/include -D_GNU_SOURCE -DLINE_MAX=2048 -DPATH_MAX=4096 -DMB_LEN_MAX=16"
        {% else %}
        export UTIL_LINUX_CFLAGS="-I${CLFS}/usr/include"
        {% endif %}
    
        NCURSESW6_CONFIG=" " \
        NCURSES6_CONFIG=" " \
        NCURSESW5_CONFIG=" " \
        NCURSES5_CONFIG=" " \
        LDFLAGS="-L${CLFS}/usr/lib -L${CLFS}/lib -Wl,-rpath,${CLFS}/usr/lib -Wl,-rpath,${CLFS}/lib -Wl,-rpath-link=${CLFS}/usr/lib -Wl,-rpath-link=${CLFS}/lib -lzstd -lbz2" \
        CFLAGS="${UTIL_LINUX_CFLAGS}" \
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --without-libmagic \
        --disable-bash-completion \
        --disable-makeinstall-chown \
        --disable-makeinstall-setuid \
        --disable-chfn-chsh \
        --disable-login \
        --disable-newgrp \
        --disable-nologin \
        --disable-hardlink \
        --disable-raw \
        --disable-vipw \
        --disable-libsmartcols \
        --disable-unshare \
        --disable-fallocate \
        --disable-nsenter \
        --disable-libmount \
        --without-systemd \
        --without-systemdsystemunitdir \
        --disable-pylibmount \
        --without-python \
        --disable-liblastlog2  \
        --disable-enosys
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/util-linux-${UTIL_LINUX_VERSION}
    - which: |
        {% if bits == 32 %}
        export CPPFLAGS="-D_GNU_SOURCE -DPATH_MAX=4096"
        {% endif %}
    
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET}
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/sys-apps/which-${WHICH_VERSION}
    - rsync: |
        ./configure \
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --with-rsyncd-conf=/etc/rsyncd.conf \
        --disable-openssl \
        --disable-xxhash \
        --disable-zstd \
        --disable-lz4
        make
        make DESTDIR=${CLFS} install
        install -d ${CLFS}/var/db/pkg/net-misc/rsync-${RSYNC_VERSION}
    - gcc-final: |
        export LIBSTDCXX_INCLUDE="${CLFS}/usr/include/c++/${GCC_VERSION}"
        export LIBSTDCXX_TARGET_INCLUDE="${CLFS}/usr/include/c++/${GCC_VERSION}/${CLFS_TARGET}"
        export LIBSUPCXX_INCLUDE="${CLFS}/build/gcc-${GCC_VERSION}/libstdc++-v3/libsupc++"
        export TARGET_CXX_WITH_HEADERS="${CLFS_TARGET}-g++ ${CLFS_CFLAGS} -isystem ${LIBSTDCXX_INCLUDE} -isystem ${LIBSTDCXX_TARGET_INCLUDE} -isystem ${LIBSUPCXX_INCLUDE}"

        export CC="${CLFS_TARGET}-gcc ${CLFS_CFLAGS}"
        export CXX="${TARGET_CXX_WITH_HEADERS}"
        export AR="${CLFS_TARGET}-ar"
        export AS="${CLFS_TARGET}-as"
        export LD="${CLFS_TARGET}-ld"
        export NM="${CLFS_TARGET}-nm"
        export RANLIB="${CLFS_TARGET}-ranlib"
        export STRIP="${CLFS_TARGET}-strip"

        export CC_FOR_BUILD="gcc"
        export CXX_FOR_BUILD="g++"
        export AR_FOR_BUILD="ar"
        export AS_FOR_BUILD="as"
        export LD_FOR_BUILD="ld"
        export NM_FOR_BUILD="nm"
        export RANLIB_FOR_BUILD="ranlib"
        export CXXFLAGS_FOR_BUILD="-O2 -pipe"

        export CC_FOR_TARGET="${CLFS_TARGET}-gcc"
        export CXX_FOR_TARGET="${CLFS_TARGET}-g++"
        export CXXFLAGS_FOR_TARGET="${CLFS_CFLAGS}"
        export RAW_CXX_FOR_TARGET="${CLFS_TARGET}-g++"

        export CPPFLAGS=""
        export CPPFLAGS_FOR_BUILD=""
        export CFLAGS_FOR_BUILD="-O2 -pipe"
        export CXXFLAGS_FOR_BUILD="-O2 -pipe"
        export LDFLAGS="-L${CLFS}/usr/lib -L${CLFS}/lib -Wl,-rpath-link=${CLFS}/usr/lib -Wl,-rpath-link=${CLFS}/lib"

        install -d ${CLFS}/usr/${CLFS_TARGET}
        ln -sfn ../include ${CLFS}/usr/${CLFS_TARGET}/include
        ln -sfn ../include ${CLFS}/usr/${CLFS_TARGET}/sys-include
        ln -sfn ../lib ${CLFS}/usr/${CLFS_TARGET}/lib

        mkdir gcc-build && cd gcc-build

        ../configure \
        {%- if arch == "powerpc" %}
        --with-abi=elfv2 \
        --enable-secureplt \
        --enable-decimal-float=no \
        {%- endif %}
        --prefix=/usr \
        --build=${CLFS_HOST} \
        --host=${CLFS_TARGET} \
        --target=${CLFS_TARGET} \
        --with-build-sysroot=${CLFS} \
        --with-local-prefix=/usr \
        --with-native-system-header-dir=/usr/include \
        --disable-multilib \
        --enable-languages=c,c++ \
        --enable-shared \
        --enable-threads=posix \
        --enable-__cxa_atexit \
        --enable-clocale=gnu \
        --enable-initfini-array \
        --enable-install-libiberty \
        --enable-linker-build-id \
        --disable-libstdcxx-pch \
        --disable-libsanitizer \
        --disable-bootstrap \
        --with-system-zlib \
        --with-gmp=${CLFS}/usr \
        --with-mpfr=${CLFS}/usr \
        --with-mpc=${CLFS}/usr

        make \
        CXX="${TARGET_CXX_WITH_HEADERS}" \
        CPPFLAGS_FOR_BUILD="" \
        CFLAGS_FOR_BUILD="-O2 -pipe" \
        CXX_FOR_BUILD="g++" \
        CXXFLAGS_FOR_BUILD="-O2 -pipe" \
        CC_FOR_TARGET="${CLFS_TARGET}-gcc" \
        CXX_FOR_TARGET="${CLFS_TARGET}-g++" \
        RAW_CXX_FOR_TARGET="${CLFS_TARGET}-g++" \
        AS_FOR_TARGET="${CLFS_TARGET}-as" \
        LD_FOR_TARGET="${CLFS_TARGET}-ld"

        make DESTDIR=${CLFS} install

        for t in gcc g++ cpp c++ gcc-ar gcc-nm gcc-ranlib; do
          if [ -e ${CLFS}/usr/bin/${CLFS_TARGET}-${t} ]; then
            ln -sf ${CLFS_TARGET}-${t} ${CLFS}/usr/bin/${t}
          fi
        done

        file ${CLFS}/usr/bin/gcc
        install -d ${CLFS}/var/db/pkg/sys-devel/gcc-final-${GCC_VERSION}
    - none-final: |
        cat > ${CLFS}/etc/profile << "PROFILE_EOF"
        # Macaroni from Scratch /etc/profile for login shells in the temporary environment.
        #
        # The following settings allow terminal-aware programs to find the terminal definitions
        # and also allow temporary tools to be found, while also allowing 'official' tools installed
        # in FHS-compliant paths to gradually replace these tools.

        export TERMINFO=/usr/share/terminfo
        export PATH=/bin:/usr/bin:/sbin:/usr/sbin
        export LD_LIBRARY_PATH=/lib:/usr/lib
        export HOME=/

        umask 022

        PROFILE_EOF
