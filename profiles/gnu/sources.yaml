sources:
  gnu:
    defaults:
      url: https://mirrors.kernel.org/gnu/{name}/{name}-{version}.tar.{ext}
      ext: xz
    packages:
      - autoconf: 2.72
      - automake: 1.16
      - libtool: 2.4.6
      - binutils: "2.40"
      - mpfr: 4.0.2
      - gmp: 6.3.0
      - mpc:
          version: 1.1.0
          ext: gz
      - gcc:
          url: https://mirrors.kernel.org/gnu/{name}/{name}-{version}/{name}-{version}.tar.{ext}
          version: 12.3.0
      - glibc:
          version: 2.41
          #patches:
          #  - glibc-2.43-linux-7-open_tree_clone.patch
      - ncurses:
          version: 6.5
          ext: gz
      - bash:
          version: 5.2.37
          ext: gz
      - bison: 3.8.2
      - coreutils: 9.11
      - diffutils: 3.12
      - findutils: 4.10.0
      - gawk: 5.1.0
      - gettext: 0.26
      - grep: 3.12
      - gzip: "1.14"
      - make:
          version: 4.4.1
          patches:
            - make-4.4-default-cxx.patch
          ext: gz
      - m4:
          version: 1.4.21
      - patch: 2.8
      - sed: 4.9
      - tar: 1.35
      - texinfo: 7.2
      - wget:
          version: 1.25.0
          ext: gz
  non-gnu:
    packages:
      - linux:
          version: "6.9"
          url: https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-{version}.tar.xz
      - git:
          version: 2.49.0
          url: https://cdn.kernel.org/pub/software/scm/git/git-{version}.tar.xz
      - zlib:
          version: 1.3.1
          url: https://github.com/madler/zlib/releases/download/v{version}/zlib-{version}.tar.gz
      - perl:
          version: 5.32.0
          url: https://www.cpan.org/src/5.0/perl-{version}.tar.gz
      - bzip2:
          version: 1.0.8
          url: https://www.sourceware.org/pub/bzip2/bzip2-{version}.tar.gz
      - check:
          version: 0.12.0
          url: https://github.com/libcheck/check/releases/download/{version}/check-{version}.tar.gz
      - file:
          version: 5.46
          url: https://astron.com/pub/file/file-{version}.tar.gz
      - rsync:
          version: 3.4.1
          url: https://download.samba.org/pub/rsync/src/rsync-{version}.tar.gz
      - util-linux:
          version: "2.40"
          url: https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-{version}.tar.gz
      - xz-utils:
          version: 5.8.1
          url: https://tukaani.org/xz/xz-{version}.tar.gz
          srcdir: xz-{version}
      - zstd:
          version: 1.5.7
          url: https://github.com/facebook/zstd/releases/download/v{version}/zstd-{version}.tar.gz
      - which:
          version: 2.23
          url: https://carlowood.github.io/which/which-{version}.tar.gz
      - pkgconf:
          version: 2.2.0
          url: https://distfiles.ariadne.space/pkgconf/pkgconf-{version}.tar.xz
      - python:
          version: 3.9.25
          url: https://www.python.org/ftp/python/{version}/Python-{version}.tar.xz
          srcdir: Python-{version}
      - cmake:
          version: 3.31.10
          url: https://github.com/Kitware/CMake/releases/download/v{version}/cmake-{version}.tar.gz
      - libffi:
          version: 3.5.2
          url: https://github.com/libffi/libffi/releases/download/v{version}/libffi-{version}.tar.gz
      - curl:
          version: 8.13.0
          url: https://github.com/curl/curl/releases/download/curl-8_13_0/curl-{version}.tar.bz2
      - openssl:
          version: 3.0.20
          url: https://www.openssl.org/source/openssl-{version}.tar.gz
      - pax-utils:
          version: 1.3.10
          url: https://github.com/gentoo/pax-utils/archive/refs/tags/v{version}.tar.gz
      - sandbox:
          version: 2.46
          url: https://github.com/gentoo/sandbox/archive/refs/tags/v{version}.tar.gz
      - python-exec:
          version: 2.4.10
          url: https://github.com/projg2/python-exec/releases/download/v{version}/python-exec-{version}.tar.bz2
      - portage:
          version: 4.0.2
          url: https://api.github.com/repos/macaroni-os/mark-portage/tarball/refs/tags/v{version} -> mark-portage-v{version}.tar.gz
          srcdir: macaroni-os-mark-portage-8e1bfa3
      - ego:
          version: 2.8.8_pre20240817
          url: https://github.com/macaroni-os/ego/archive/ddfcfe117be24c95f21f72901c252ceefa3205d7.zip
